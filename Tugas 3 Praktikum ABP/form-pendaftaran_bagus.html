<!DOCTYPE html>
<html lang="id">
<head>
    <style>
        body { 
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; font-family: 'Inter', sans-serif;
        }
        .form-card { 
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); padding: 40px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 450px; color: white;
        }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #94a3b8; }
        input[type="text"], input[type="password"], input[type="email"], select, textarea { 
            width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box;
        }
        .btn-submit { background: #38bdf8; border: none; padding: 12px; width: 100%; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Formulir Pendaftaran</h2>
        <form>
            <div class="input-group"><label>Nama:</label><input type="text" value="Muhammad Daffa Bagus Jumantoro" readonly></div>
            <div class="input-group"><label>NIM:</label><input type="text" value="2311102222" readonly></div>
            <div class="input-group"><label>Password:</label><input type="password"></div>
            <div class="input-group"><label>Email:</label><input type="email"></div>
            <div class="input-group"><label>Jenis Kelamin:</label><input type="radio" name="jk"> Pria <input type="radio" name="jk"> Wanita</div>
            <div class="input-group"><label>Hobi:</label><input type="checkbox"> Renang <input type="checkbox"> Coding</div>
            <div class="input-group"><label>Pendidikan:</label><select><option>D3</option><option>S1</option></select></div>
            <div class="input-group"><label>Kritik & Saran:</label><textarea rows="3"></textarea></div>
            <button type="submit" class="btn-submit">SUBMIT DATA</button>
        </form>
    </div>
</body>
</html>
